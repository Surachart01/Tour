    <style>

      .form-control {

      .form-control:hover {

      textarea.form-control {

      .form-group label {

      .table {

      .modal-header {
        background: linear-gradient(135deg, #34495e 0%, #2c3e50 100%);

        color: white;

      .input-group-append .btn {
        height: 45px;
        border-radius: 0 6px 6px 0;
      }

      /* Custom tooltip styles */
      .tooltip-btn {
        position: relative;
        display: inline-block;
      }

      .tooltip-btn .tooltip-text {
        visibility: hidden;
        width: 80px;
        background-color: #333;
        color: #fff;
        text-align: center;
        border-radius: 4px;
        padding: 5px 8px;
        position: absolute;
        z-index: 1000;
        bottom: 125%;
        left: 50%;
        margin-left: -40px;
        opacity: 0;
        transition: opacity 0.3s;
        font-size: 12px;
        font-weight: normal;
        white-space: nowrap;
        pointer-events: none;
      }

      .tooltip-btn .tooltip-text::after {
        content: "";
        position: absolute;
        top: 100%;
        left: 50%;
        margin-left: -5px;
        border-width: 5px;
        border-style: solid;
        border-color: #333 transparent transparent transparent;
      }

      .tooltip-btn:hover .tooltip-text {
        visibility: visible;
        opacity: 1;

      .tooltip-btn .btn {

        height: 100%;

    <script>
      let currentRow = null;
      let editRowIndex = null;
      let isEditing = false;
      let markups = [];

      document.addEventListener("DOMContentLoaded", function () {
        const urlParams = new URLSearchParams(window.location.search);
        const markupId = urlParams.get("id");

        if (markupId) {
          // Fetch the markup details from the backend using the markup ID
          fetch(`${Endpoint}/api/v1/markups/${markupId}`, {
            headers: {
              Authorization: `Bearer ${localStorage.getItem("token")}`, // Authorization header
            },
          })
            .then((response) => response.json())
            .then((markup) => {
              // Populate the form with the fetched markup data
              console.log("Received markup data from backend:", markup);
              document.getElementById("groupName").value = markup.markup_group;
              const hotelMarkupUnit = markup.hotel_markup_unit || "%";
              document.getElementById("hotelMarkupUnit").value =
                hotelMarkupUnit;
              document.getElementById("excursionMarkup").value =
                markup.excursion_markup !== null ? markup.excursion_markup : 0;
              document.getElementById("excursionMarkupUnit").value =
                markup.excursion_markup_unit || "%";
              document.getElementById("tourMarkup").value =
                markup.tour_markup !== null ? markup.tour_markup : 0;
              document.getElementById("tourMarkupUnit").value =
                markup.tour_markup_unit || "%";
              document.getElementById("transferMarkup").value =
                markup.transfer_markup !== null ? markup.transfer_markup : 0;
              document.getElementById("transferMarkupUnit").value =
                markup.transfer_markup_unit || "%";
              document.getElementById("extraBedMarkup").value =
                markup.extra_bed_markup !== null && markup.extra_bed_markup !== undefined
                  ? markup.extra_bed_markup
                  : 0;
              document.getElementById("extraBedMarkupUnit").value =
                markup.extra_bed_markup_unit || "flat rate";

              // Populate the hotel markup percentages table
              markup.hotel_markup_percentages.forEach((hotelMarkup, index) => {
                const hotelMarkupRow = `
                  <tr data-id="${hotelMarkup.id}">
                    <td>${hotelMarkup.price_from}</td>
                    <td>${hotelMarkup.price_to}</td>
                    <td>${hotelMarkup.markup_percentage}</td>
                    <td>
                      <div style="display: flex; gap: 5px;">
                        <div class="tooltip-btn">
                          <button type="button" class="btn btn-warning btn-sm" onclick="editMarkupRow(this)">
                            <i class="fas fa-edit"></i>
                          </button>
                          <span class="tooltip-text">Edit</span>
                        </div>
                        <div class="tooltip-btn">
                          <button type="button" class="btn btn-danger btn-sm" onclick="deleteMarkupRow(this)">
                            <i class="fas fa-trash"></i>
                          </button>
                          <span class="tooltip-text">Delete</span>
                        </div>
                      </div>
                    </td>
                  </tr>
                `;
                document
                  .getElementById("hotelMarkupTableBody")
                  .insertAdjacentHTML("beforeend", hotelMarkupRow);
              });
            })
            .catch((error) => {
              console.error("Error fetching markup:", error);
            });
        }
      });

      function editMarkupRow(button) {
        const row = button.parentElement.parentElement.parentElement.parentElement;
        const cells = row.querySelectorAll("td");
        document.getElementById("editPriceFrom").value = cells[0].textContent;
        document.getElementById("editPriceTo").value = cells[1].textContent;
        document.getElementById("editMarkupPercentage").value =
          cells[2].textContent;
        currentRow = row; // Save reference to the current row being edited
        editRowIndex = row.getAttribute("data-index"); // Save the index of the row
        isEditing = true;
        $("#editMarkupRowModal").modal("show");
      }

      // Save edited row data
      document
        .getElementById("saveEditedRow")
        .addEventListener("click", function () {
          if (isEditing && currentRow) {
            currentRow.cells[0].textContent =
              document.getElementById("editPriceFrom").value;
            currentRow.cells[1].textContent =
              document.getElementById("editPriceTo").value;
            currentRow.cells[2].textContent = document.getElementById(
              "editMarkupPercentage"
            ).value;

            isEditing = false;
            currentRow = null; // Reset currentRow
          }
        });

      // Handle row delete
      function deleteMarkupRow(button) {
        if (confirm("Are you sure you want to delete this row?")) {
          const row = button.parentElement.parentElement.parentElement.parentElement;
          row.remove(); // Remove from table
        }
      }

      // Handle adding new hotel markup row
      document
        .getElementById("saveNewHotelMarkup")
        .addEventListener("click", function () {
          const priceFrom = document.getElementById("newPriceFrom").value;
          const priceTo = document.getElementById("newPriceTo").value;
          const markupPercentage = document.getElementById(
            "newMarkupPercentage"
          ).value;

          if (priceFrom && priceTo && markupPercentage) {
            const newRowId = `new-${Date.now()}`;
            const hotelMarkupRow = `
            <tr data-id="${newRowId}">
              <td>${priceFrom}</td>
              <td>${priceTo}</td>
              <td>${markupPercentage}</td>
              <td>
                <div style="display: flex; gap: 5px;">
                  <div class="tooltip-btn">
                    <button type="button" class="btn btn-warning btn-sm" onclick="editMarkupRow(this)">
                      <i class="fas fa-edit"></i>
                    </button>
                    <span class="tooltip-text">Edit</span>
                  </div>
                  <div class="tooltip-btn">
                    <button type="button" class="btn btn-danger btn-sm" onclick="deleteMarkupRow(this)">
                      <i class="fas fa-trash"></i>
                    </button>
                    <span class="tooltip-text">Delete</span>
                  </div>
                </div>
              </td>
            </tr>
          `;
            document
              .getElementById("hotelMarkupTableBody")
              .insertAdjacentHTML("beforeend", hotelMarkupRow);
          }
          // Clear input fields after adding
          document.getElementById("newPriceFrom").value = "";
          document.getElementById("newPriceTo").value = "";
          document.getElementById("newMarkupPercentage").value = "";
        });

      // Handle form submission for editing markup
      document
        .getElementById("editMarkupForm")
        .addEventListener("submit", function (event) {
          event.preventDefault();

          const groupName = document.getElementById("groupName").value;
          const hotelMarkupUnit =
            document.getElementById("hotelMarkupUnit").value;
          const excursionMarkup =
            document.getElementById("excursionMarkup").value;
          const excursionMarkupUnit = document.getElementById(
            "excursionMarkupUnit"
          ).value;
          const tourMarkup = document.getElementById("tourMarkup").value;
          const tourMarkupUnit =
            document.getElementById("tourMarkupUnit").value;
          const transferMarkup =
            document.getElementById("transferMarkup").value;
          const transferMarkupUnit =
            document.getElementById("transferMarkupUnit").value;
          const extraBedMarkup =
            document.getElementById("extraBedMarkup").value;
          const extraBedMarkupUnit =
            document.getElementById("extraBedMarkupUnit").value;

          const hotelMarkups = Array.from(
            document.querySelectorAll("#hotelMarkupTableBody tr")
          ).map((row) => {
            const dataId = row.getAttribute("data-id");
            return {
              id: (!dataId || dataId.startsWith("new-"))
                ? null
                : parseInt(dataId),
              price_from: parseFloat(row.cells[0].textContent) || 0,
              price_to: parseFloat(row.cells[1].textContent) || 0,
              markup_percentage: parseFloat(row.cells[2].textContent) || 0,
            };
          });

          const updatedMarkup = {
            markup_group: groupName,
            hotel_markup_unit: hotelMarkupUnit,
            hotel_markup_percentages: hotelMarkups,
            extra_bed_markup: parseFloat(extraBedMarkup) || 0,
            extra_bed_markup_unit: extraBedMarkupUnit,
            excursion_markup: parseFloat(excursionMarkup) || 0,
            excursion_markup_unit: excursionMarkupUnit,
            tour_markup: parseFloat(tourMarkup) || 0,
            tour_markup_unit: tourMarkupUnit,
            transfer_markup: parseFloat(transferMarkup) || 0,
            transfer_markup_unit: transferMarkupUnit,
          };

          console.log("Received markup data from backend:", updatedMarkup);

          // Send the updated markup data to the backend
          const markupId = new URLSearchParams(window.location.search).get(
            "id"
          );
          fetch(`${Endpoint}/api/v1/markups/${markupId}`, {
            method: "PUT",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${localStorage.getItem("token")}`,
            },
            body: JSON.stringify(updatedMarkup),
          })
            .then((response) => {
              if (response.ok) {
                alert("Markups updated successfully.");
                window.location.href = "markup.html";
              } else {
                if (response.status === 401) {
                  // Handle 401 Unauthorized
                  alert("Unauthorized. Please log in again.");
                  window.location.href = "login.html"; // Redirect to login page
                } else if (response.status === 403) {
                  // Handle 403 Forbidden
                  alert(
                    "You don't have sufficient permissions to perform this action."
                  );
                  return;
                } else {
                  response.json().then((data) => {
                    alert("Error updating markup: " + data.message);
                  });
                }
              }
            })
            .catch((error) => {
              console.error("Error updating markup:", error);
            });
        });
    </script>
  </body>
</html>
