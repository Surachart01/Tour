      let currentEditRow = null; // Track the row being edited

      function formatToDDMMYYYY(dateString) {
        const ddmmyyyyRegex = /^\d{2}\/\d{2}\/\d{4}$/;
        if (ddmmyyyyRegex.test(dateString)) {
          return dateString; // Return as-is if already in dd/mm/yyyy format
        }

        // Handle dd-mm-yyyy format (convert to dd/mm/yyyy)
        const ddmmyyyyDashRegex = /^\d{2}-\d{2}-\d{4}$/;
        if (ddmmyyyyDashRegex.test(dateString)) {
          return dateString.replace(/-/g, "/");
        }

        // Handle yyyy-mm-dd format
        const dateParts = dateString.split("-");
        if (dateParts.length === 3) {
          const [year, month, day] = dateParts;
          return `${day}/${month}/${year}`;
        }
        return dateString; // Return original if format not recognized
      }

      function formatToYYYYMMDD(dateString) {
        // Check if the date is in dd/mm/yyyy format
        const ddmmyyyySlashRegex = /^\d{2}\/\d{2}\/\d{4}$/;
        if (ddmmyyyySlashRegex.test(dateString)) {
          const [day, month, year] = dateString.split("/");
          return `${year}-${month}-${day}`; // Convert to yyyy-mm-dd
        }

        // Check if the date is in dd-mm-yyyy format
        const ddmmyyyyDashRegex = /^\d{2}-\d{2}-\d{4}$/;
        if (ddmmyyyyDashRegex.test(dateString)) {
          const [day, month, year] = dateString.split("-");
          return `${year}-${month}-${day}`; // Convert to yyyy-mm-dd
        }

        // Assume the date is already in yyyy-mm-dd format
        const yyyymmddRegex = /^\d{4}-\d{2}-\d{2}$/;
        if (yyyymmddRegex.test(dateString)) {
          return dateString;
        }

        // Return original string if format not recognized
        return dateString;
      }

      function editRow(row) {
        currentEditRow = row; // Store reference to the row being edited

        // Get modal elements
        const modalStartDate = document.getElementById("modalStartDate");
        const modalEndDate = document.getElementById("modalEndDate");
        const modalPax = document.getElementById("modalPax");
        const modalSinglePrice = document.getElementById("modalSinglePrice");
        const modalDoublePrice = document.getElementById("modalDoublePrice");
        const modalTriplePrice = document.getElementById("modalTriplePrice");

        // Update the data object with the latest values from the table
        const data = {
          startDate: formatToYYYYMMDD(row.cells[0].textContent.trim()),
          endDate: formatToYYYYMMDD(row.cells[1].textContent.trim()),
          pax: parseInt(row.cells[2].textContent.trim()) || 0,
          singlePrice: parseFloat(row.cells[3].textContent.trim()) || 0,
          doublePrice: parseFloat(row.cells[4].textContent.trim()) || 0,
          triplePrice: parseFloat(row.cells[5].textContent.trim()) || 0,
        };

        // Set values in the modal with the latest table data
        modalStartDate.value = data.startDate;
        modalEndDate.value = data.endDate;
        modalPax.value = data.pax;
        modalSinglePrice.value = data.singlePrice;
        modalDoublePrice.value = data.doublePrice;
        modalTriplePrice.value = data.triplePrice;

        $("#addTourPriceModal").modal("show"); // Show the modal
      }

      function deleteRow(row) {
        if (confirm("Are you sure you want to delete this row?")) {
          const index = Array.from(
            document.getElementById("tourPriceTableBody").children
          ).indexOf(row);
          tourPricings.splice(index, 1);
          row.remove();
        }
      }

      function populatePrices(prices) {
        const tourPriceTableBody =
          document.getElementById("tourPriceTableBody");

        // Clear existing tourPricings array and repopulate it
        tourPricings = [];

        // Sort prices by start_date in ascending order
        const sortedPrices = [...prices].sort((a, b) => {
          const dateA = new Date(a.start_date);
          const dateB = new Date(b.start_date);
          return dateA - dateB;
        });

        sortedPrices.forEach((price) => {
          const row = document.createElement("tr");

          // Format dates to DD/MM/YYYY
          const formattedStartDate = formatToDDMMYYYY(price.start_date);
          const formattedEndDate = formatToDDMMYYYY(price.end_date);

          row.innerHTML = `
              <td>${formattedStartDate}</td>
              <td>${formattedEndDate}</td>
              <td>${price.pax}</td>
              <td>${price.single_price}</td>
              <td>${price.double_price}</td>
              <td>${price.triple_price}</td>
              <td>
                <div class="btn-group" role="group">
                  <div class="tooltip-btn">
                    <button type="button" class="btn btn-sm btn-primary edit-btn">
                      <i class="fas fa-edit"></i>
                    </button>
                    <span class="tooltip-text">Edit</span>
                  </div>
                  <div class="tooltip-btn">
                    <button type="button" class="btn btn-sm btn-danger delete-btn ml-1">
                      <i class="fas fa-trash"></i>
                    </button>
                    <span class="tooltip-text">Delete</span>
                  </div>
                </div>
              </td>
            `;

          // Add the price data to the global tourPricings array with formatted dates
          tourPricings.push({
            startDate: formattedStartDate,
            endDate: formattedEndDate,
            pax: price.pax,
            singlePrice: price.single_price,
            doublePrice: price.double_price,
            triplePrice: price.triple_price,
          });

          // Add event listeners for Edit and Delete buttons
          row
            .querySelector(".edit-btn")
            .addEventListener("click", () => editRow(row, price));
          row
            .querySelector(".delete-btn")
            .addEventListener("click", () => deleteRow(row));

          tourPriceTableBody.appendChild(row);
        });
      }

      // Form validation function
      function validateTourValidity() {
        const selectedDays = document.querySelectorAll(
          'input[id^="tourDay"]:checked'
        );

        if (selectedDays.length === 0) {
          alert(
            "Please select at least one day of the week for tour validity."
          );
          return false;
        }

        return true;
      }

      document
        .getElementById("tourForm")
        .addEventListener("submit", function (event) {
          event.preventDefault();

          // Validate tour validity first
          if (!validateTourValidity()) {
            return;
          }

          console.log("Submit event called");

          const itinerarySections = document.querySelectorAll(
            "#itineraryDetails .day-section"
          );

          const tourDays = Array.from(itinerarySections).map(
            (section, index) => {
              const day = index + 1; // Day number
              const itinerary = section.querySelector("textarea").value.trim(); // Itinerary details

              // Find all activity rows within the current section
              const activityRows = section.querySelectorAll(
                ".activity-row, .activity-item"
              );

              const details = [];

              // Handle hotels - find the hotels activity container specifically
              const hotelsContainer = section
                .querySelector(".activity-container h6 i.fa-bed")
                ?.closest(".activity-container");
              const hotelRows = hotelsContainer
                ? hotelsContainer.querySelectorAll(".activity-item")
                : [];

              console.log(`Day ${day}: Found ${hotelRows.length} hotel rows`);

              hotelRows.forEach((row) => {
                const hotelDropdown = row.querySelector(".hotel-dropdown");
                const roomTypeDropdown =
                  row.querySelector(".roomtype-dropdown");
                const cityHotel =
                  row.querySelector(".city-dropdown-hotel")?.value || "";
                const fromTime = row.querySelector(".from-time")?.value || null;
                const toTime = row.querySelector(".to-time")?.value || null;

                const hotelId = parseInt(hotelDropdown?.value, 10) || null;
                const hotelName =
                  hotelDropdown?.options[hotelDropdown.selectedIndex]?.text ||
                  "";
                const roomTypeId =
                  parseInt(roomTypeDropdown?.value, 10) || null;
                const roomTypeName =
                  roomTypeDropdown?.options[roomTypeDropdown.selectedIndex]
                    ?.text || "";

                if (hotelId) {
                  const hotelDetail = {
                    from_time: fromTime,
                    to_time: toTime,
                    city: cityHotel,
                    type_of_tour: "hotels",
                    hotel_id: hotelId,
                    hotel_name: hotelName,
                    room_type_id: roomTypeId,
                    room_type: roomTypeName,
                  };
                  details.push(hotelDetail);
                  console.log(`Day ${day}: Added hotel detail:`, hotelDetail);
                } else {
                  console.log(
                    `Day ${day}: Hotel ID not found, skipping hotel data`
                  );
                }
              });

              // Handle excursions
              const excursionRows = section.querySelectorAll(
                ".excursions-list .activity-item"
              );
              excursionRows.forEach((row) => {
                const excursionDropdown = row.querySelector(
                  ".excursion-dropdown"
                );
                const cityExcursion =
                  row.querySelector(".city-dropdown-excursion")?.value || "";
                const fromTime = row.querySelector(".from-time")?.value || null;
                const toTime = row.querySelector(".to-time")?.value || null;

                const excursionId =
                  parseInt(excursionDropdown?.value, 10) || null;
                const excursionName =
                  excursionDropdown?.options[excursionDropdown.selectedIndex]
                    ?.text || "";

                if (excursionId) {
                  details.push({
                    from_time: fromTime,
                    to_time: toTime,
                    city: cityExcursion,
                    type_of_tour: "excursions",
                    excursion_id: excursionId,
                    excursion_name: excursionName,
                  });
                }
              });

              // Handle transfers
              const transferRows = section.querySelectorAll(
                ".transfers-list .activity-item"
              );
              transferRows.forEach((row) => {
                const transferDropdown =
                  row.querySelector(".transfer-dropdown");
                const cityTransfer =
                  row.querySelector(".city-dropdown-transfer")?.value || "";
                const fromTime = row.querySelector(".from-time")?.value || null;
                const toTime = row.querySelector(".to-time")?.value || null;

                const transferId =
                  parseInt(transferDropdown?.value, 10) || null;
                const transferName =
                  transferDropdown?.options[transferDropdown.selectedIndex]
                    ?.text || "";

                if (transferId) {
                  details.push({
                    from_time: fromTime,
                    to_time: toTime,
                    city: cityTransfer,
                    type_of_tour: "transfers",
                    transfer_id: transferId,
                    transfer_name: transferName,
                  });
                }
              });

              return {
                day,
                itinerary,
                details, // Attach the array of details
              };
            }
          );

          // Log the constructed tourDays array
          console.log("Constructed tourDays:", tourDays);

          // Collect Pricing Details
          const pricingRows = document.querySelectorAll(
            "#tourPriceTableBody tr"
          );
          const tourPricings = Array.from(pricingRows).map((row) => ({
            start_date: formatToYYYYMMDD(row.cells[0].textContent.trim()),
            end_date: formatToYYYYMMDD(row.cells[1].textContent.trim()),
            pax: parseInt(row.cells[2].textContent.trim()),
            single_price: parseFloat(row.cells[3].textContent.trim()),
            double_price: parseFloat(row.cells[4].textContent.trim()),
            triple_price: parseFloat(row.cells[5].textContent.trim()),
            currency_id: 1, // Assuming default currency
          }));

          // Collect tour validity data and convert to available_days format
          const tourValidDays = Array.from(
            document.querySelectorAll('input[id^="tourDay"]:checked')
          ).map((cb) => parseInt(cb.value));

          // Convert to available_days format for backend
          const availableDays = tourValidDays.map((dayOfWeek) => ({
            day_of_week: dayOfWeek,
          }));

          // Construct the full tour data
          const tourData = {
            name: document.getElementById("tourName").value,
            city: document.getElementById("tourCode").value,
            category: document.getElementById("tourCategory").value,
            description: document.getElementById("tourDescription").value,
            duration: tourDays.length,
            route: document.getElementById("tourRoute").value,
            display_order: parseInt(document.getElementById("displayOrder").value) || 0,
            tot: document.getElementById("tourDeparture").value,
            date: new Date().toISOString(), // Use a specific date if required
            available_days: availableDays,
            tour_days: tourDays,
            tour_pricings: tourPricings,
          };

          const token = localStorage.getItem("token");
          if (!token) {
            alert("You are not authorized. Please log in first.");
            window.location.href = "login.html";
            return;
          }

          const urlParams = new URLSearchParams(window.location.search);
          const tourId = urlParams.get("id");

          if (!tourId) {
            alert("Invalid Tour ID.");
            return;
          }

          // Log the final payload
          console.log(
            "Final tourData payload:",
            JSON.stringify(tourData, null, 2)
          );

          const isCloneMode = new URLSearchParams(window.location.search).get("clone") === "true";
          const fetchUrl = isCloneMode ? `${Endpoint}/api/v1/tours` : `${Endpoint}/api/v1/tours/${tourId}`;
          const fetchMethod = isCloneMode ? "POST" : "PUT";

          // Send POST/PUT request
          fetch(fetchUrl, {
            method: fetchMethod,
            headers: {
              Authorization: `Bearer ${token}`,
              "Content-Type": "application/json",
            },
            body: JSON.stringify(tourData),
          })
            .then((response) => {
              if (response.ok) {
                alert(isCloneMode ? "Tour cloned successfully!" : "Tour updated successfully!");
                window.location.href = "tours.html";
              } else {
                return response.json().then((errorData) => {
                  console.error("Failed to save tour:", errorData);
                  alert(
                    `Error: ${errorData.message || "Failed to save tour."}`
                  );
                });
              }
            })
            .catch((error) => {
              console.error("Error saving tour:", error);
              alert("Failed to save tour. Please try again later.");
            });
        });
    </script>
