<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tax Invoice</title>
    <link href="../vendors/font-awesome/css/font-awesome.min.css" rel="stylesheet" />
    <style>
      :root { --navy:#1f354d; --orange:#ffbd00; --line:#202020; --paper:#fff; --muted:#64748b; --teal:#14b8a6; }
      * { box-sizing:border-box; } body { margin:0; background:#e8edf3; color:#111; font-family:Tahoma, Arial, sans-serif; }
      .tool-bar { position:sticky; top:0; z-index:10; display:flex; align-items:center; justify-content:space-between; gap:16px; padding:14px 24px; background:var(--navy); color:white; box-shadow:0 2px 10px #0002; }
      .tool-bar h1 { margin:0; font-size:19px; } .tool-actions { display:flex; flex-wrap:wrap; gap:8px; }
      button, .button { border:0; border-radius:5px; padding:10px 14px; font:600 14px Tahoma, Arial, sans-serif; cursor:pointer; text-decoration:none; }
      .button-secondary { background:#edf2f7; color:#1f354d; } .button-save { background:#18a76f; color:#fff; } .button-print { background:#1989d9; color:#fff; }
      .notice { max-width:1100px; margin:16px auto 0; padding:12px 16px; background:#e8f7ff; color:#075985; border:1px solid #bae6fd; border-radius:6px; font-size:13px; }
      .invoice-paper { width:210mm; min-height:297mm; margin:18px auto 40px; padding:8mm; background:var(--paper); box-shadow:0 2px 18px #0003; font-family:Tahoma, Arial, sans-serif; font-size:11px; }
      .company-header { display:grid; grid-template-columns:52mm 1fr; border:1px solid var(--line); min-height:30mm; } .company-header img { max-width:48mm; max-height:27mm; padding:4mm; object-fit:contain; } .company-info { padding:3mm 4mm; font-size:11px; line-height:1.28; }
      .title-band { background:var(--orange); border:1px solid var(--line); border-top:0; text-align:center; font-family:Georgia, serif; font-size:20px; padding:1mm; }
      .party-grid { display:grid; grid-template-columns:1fr 1.7fr; margin-top:3mm; border:1px solid var(--line); } .party { min-height:24mm; } .party + .party { border-left:1px solid var(--line); }
      .section-title { padding:1mm 2mm; background:#000; color:#fff; text-align:center; font-family:Georgia, serif; font-size:14px; } .party-content { padding:2mm 3mm; line-height:1.32; }
      .details-grid { display:grid; grid-template-columns:1.1fr .9fr; margin:3mm auto 7mm; width:93%; border:1px solid var(--line); } .details-grid > div { padding:1.2mm 2mm; border-bottom:1px solid var(--line); min-height:5.5mm; } .details-grid > div:nth-last-child(-n+2) { border-bottom:0; } .details-label { font-weight:700; background:#f5f5f5; } .invoice-number-input { width:100%; border:0; border-bottom:1px dotted #666; font:inherit; text-align:center; }
      .service-heading { background:var(--orange); border:1px solid var(--line); text-align:center; font-family:Georgia, serif; font-size:20px; padding:1mm; }
      .service-section { margin:0 0 4mm; border:1px solid var(--line); border-top:0; } .service-section h2 { margin:0; padding:1.5mm 2mm; background:#000; color:#fff; font-family:Georgia, serif; font-size:13px; }
      table { width:100%; border-collapse:collapse; } th, td { border:1px solid var(--line); padding:1.3mm 1.5mm; vertical-align:middle; } th { background:#fafafa; font-weight:700; text-align:left; } .money { text-align:right; white-space:nowrap; } .select-cell { width:7mm; text-align:center; } .description { min-width:55mm; } .adv-input, .total-input { width:100%; min-width:15mm; padding:1mm; border:1px solid #c9d3df; text-align:right; font:inherit; } .adv-input { color:#dc2626; } .tour-hotel td { background:#fffaf2; } .tour-hotel .description { padding-left:7mm; font-style:italic; } .document-empty { padding:8mm; text-align:center; color:var(--muted); }
      /* Tax documents have up to nine columns. Keep the complete table inside the A4 paper. */
      .service-section table { table-layout:fixed; font-size:8.5px; }
      .service-section th, .service-section td { padding:.8mm 1mm; overflow-wrap:anywhere; word-break:normal; }
      .service-section th:nth-child(1), .service-section td:nth-child(1) { width:6%; }
      .service-section th:nth-child(2), .service-section td:nth-child(2) { width:8%; }
      .service-section th:nth-child(3), .service-section td:nth-child(3) { width:13%; }
      .service-section th:nth-child(4), .service-section td:nth-child(4) { width:21%; }
      .service-section th:nth-child(5), .service-section td:nth-child(5) { width:13%; }
      .service-section th:nth-child(6), .service-section td:nth-child(6) { width:10%; }
      .service-section th:nth-child(7), .service-section td:nth-child(7) { width:11%; }
      .service-section th:nth-child(8), .service-section td:nth-child(8) { width:11%; }
      .service-section th:nth-child(9), .service-section td:nth-child(9) { width:7%; }
      .service-section .description { min-width:0; }
      .service-section .money { white-space:normal; }
      .service-section .adv-input, .service-section .total-input { min-width:0; padding:.5mm; font-size:8.5px; }
      .total-box { margin-left:auto; width:92mm; border:1px solid var(--line); } .total-box td:first-child { text-align:right; font-weight:700; } .total-box tr:last-child td { font-weight:700; font-size:12px; background:#f5f5f5; } .total-box .adv-total { color:#dc2626; }
      .signature-row { display:flex; justify-content:space-between; gap:40mm; margin:20mm 6mm 7mm; font-family:Georgia, serif; } .footer { text-align:center; font-family:Georgia, serif; font-size:10px; }.footer strong { display:block; font-size:12px; }
      .loading { padding:60px; text-align:center; color:var(--muted); font-size:16px; }
      @media (max-width:900px) { .invoice-paper { width:100%; min-height:0; margin:0; padding:12px; box-shadow:none; overflow-x:auto; } .tool-bar { align-items:flex-start; flex-direction:column; } .company-header { grid-template-columns:120px 1fr; } .party-grid, .details-grid { min-width:720px; } .service-section { min-width:900px; } }
      @media print { @page { size:A4; margin:0; } body { background:white; } .tool-bar, .notice { display:none !important; } .invoice-paper { width:210mm; min-height:297mm; margin:0; padding:8mm; box-shadow:none; } .adv-input, .total-input, .invoice-number-input { border:0 !important; appearance:none; background:transparent; } .service-section, tr { break-inside:avoid; } }
    </style>
  </head>
  <body>
    <header class="tool-bar">
      <h1 id="pageTitle"><i class="fa fa-file-text-o"></i> Tax Invoice</h1>
      <div class="tool-actions">
        <a class="button button-secondary" href="tax_invoices.html"><i class="fa fa-arrow-left"></i> Back to Tax Invoices</a>
        <button id="saveButton" class="button-save"><i class="fa fa-save"></i> Save Tax Invoice</button>
        <button id="printButton" class="button-print"><i class="fa fa-file-pdf-o"></i> Open PDF / Print</button>
      </div>
    </header>
    <div class="notice"><i class="fa fa-info-circle"></i> Select only the services needed for this document. ADV is not subject to VAT. VAT is calculated at 7% from the remaining selling price.</div>
    <main id="invoicePaper" class="invoice-paper"><div class="loading"><i class="fa fa-spinner fa-spin"></i> Loading confirmed booking...</div></main>
    <script src="js/config.js"></script>
    <script src="js/tax_invoices/tax_invoice_editor.js?v=20260717"></script>
  </body>
</html>
