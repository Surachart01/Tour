      .form-control:focus {
        border-color: #1abb9c !important;

      }

      .btn-primary {

        border: none;

      }

      .btn-danger:hover {
        background: linear-gradient(135deg, #c0392b 0%, #a93226 100%);

      }

      .form-control {

        transition: all 0.3s ease;
      }

      .form-control:hover {

      /* Custom tooltip styles */
      .tooltip-btn {
        position: relative;

      .tooltip-btn .tooltip-text {

        width: 80px;
        background-color: #333;
        color: #fff;
        text-align: center;

        padding: 5px 8px;

        left: 50%;

    <script>
      let currentRow = null;

      // Function to update unit display for Excursion, Tour, and Transfer
      function updateUnitDisplay(selectElement, displayElement) {
        const unit = selectElement.value === "flat rate" ? "THB" : "%";
        displayElement.textContent = unit;
      }

      // Add event listeners to update the display for units dynamically
      document
        .getElementById("excursionMarkupUnit")
        .addEventListener("change", function () {
          updateUnitDisplay(
            this,
            document.getElementById("excursionMarkupUnitDisplay")
          );
        });
      document
        .getElementById("tourMarkupUnit")
        .addEventListener("change", function () {
          updateUnitDisplay(
            this,
            document.getElementById("tourMarkupUnitDisplay")
          );
        });
      document
        .getElementById("transferMarkupUnit")
        .addEventListener("change", function () {
          updateUnitDisplay(
            this,
            document.getElementById("transferMarkupUnitDisplay")
          );
        });

      // Trigger initial unit display
      updateUnitDisplay(
        document.getElementById("excursionMarkupUnit"),
        document.getElementById("excursionMarkupUnitDisplay")
      );
      updateUnitDisplay(
        document.getElementById("tourMarkupUnit"),
        document.getElementById("tourMarkupUnitDisplay")
      );
      updateUnitDisplay(
        document.getElementById("transferMarkupUnit"),
        document.getElementById("transferMarkupUnitDisplay")
      );

      // Save Markup Data and send to backend
      document
        .getElementById("submitMarkup")
        .addEventListener("click", function (event) {
          event.preventDefault();

          const groupName = document.getElementById("groupName").value;
          const hotelMarkupUnit =
            document.getElementById("hotelMarkupUnit").value;

          // Collect hotel markup rows
          const hotelMarkups = [];
          document
            .querySelectorAll("#hotelMarkupTableBody tr")
            .forEach((row) => {
              const cells = row.querySelectorAll("td");
              hotelMarkups.push({
                price_from: parseFloat(cells[0].textContent),
                price_to: parseFloat(cells[1].textContent),
                markup_percentage: parseFloat(cells[2].textContent),
              });
            });

          // Collect excursion, tour, and transfer markup data
          const excursionMarkup = parseFloat(
            document.getElementById("excursionMarkup").value
          ) || 0;
          const excursionMarkupUnit = document.getElementById(
            "excursionMarkupUnit"
          ).value;

          const tourMarkup = parseFloat(
            document.getElementById("tourMarkup").value
          ) || 0;
          const tourMarkupUnit =
            document.getElementById("tourMarkupUnit").value;

          const transferMarkup = parseFloat(
            document.getElementById("transferMarkup").value
          ) || 0;
          const transferMarkupUnit =
            document.getElementById("transferMarkupUnit").value;

          // Construct the payload to send to the backend
          const markupData = {
            markup_group: groupName,
            hotel_markup_unit: hotelMarkupUnit,
            hotel_markup_percentages: hotelMarkups,
            excursion_markup: excursionMarkup,
            excursion_markup_unit: excursionMarkupUnit,
            tour_markup: tourMarkup,
            tour_markup_unit: tourMarkupUnit,
            transfer_markup: transferMarkup,
            transfer_markup_unit: transferMarkupUnit,
          };

          // Replace "API_BASE_URL" with your actual API endpoint URL
          fetch(`${Endpoint}/api/v1/markups`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${localStorage.getItem("token")}`, // Authorization header
            },
            body: JSON.stringify(markupData), // Send the markup data as JSON
          })
            .then((response) => {
              if (response.ok) {
                alert("Markup added successfully.");
                window.location.href = "markup.html"; // Redirect to markup listing page after successful creation
              } else if (response.status === 401) {
                // Handle 401 Unauthorized
                alert("Unauthorized. Please log in again.");
                window.location.href = "login.html"; // Redirect to login page
              } else if (response.status === 403) {
                // Handle 403 Forbidden
                alert(
                  "You don't have sufficient permissions to perform this action."
                );
                return;
              } else {
                response.json().then((data) => {
                  let errorMessage = "Error adding markup.";
                  if (data && data.message) {
                    errorMessage = data.message; // Use the backend-provided message
                  }
                  alert(errorMessage);
                });
              }
            })
            .catch((error) => {
              console.error("Error adding markup:", error);
              alert("An unexpected error occurred. Please try again later.");
            });
        });

      // Add Hotel Markup Row to the table
      document
        .getElementById("saveMarkup")
        .addEventListener("click", function () {
          const priceFrom = document.getElementById("priceFrom").value;
          const priceTo = document.getElementById("priceTo").value;
          const markup = document.getElementById("markupPercentage").value;

          if (priceFrom && priceTo && markup) {
            const tableBody = document.getElementById("hotelMarkupTableBody");
            const row = `
            <tr>
              <td>${priceFrom}</td>
              <td>${priceTo}</td>
              <td>${markup}</td>
              <td>
                <div style="display: flex; gap: 5px;">
                  <div class="tooltip-btn">
                    <button type="button" class="btn btn-warning btn-sm edit-btn">
                      <i class="fas fa-edit"></i>
                    </button>
                    <span class="tooltip-text">Edit</span>
                  </div>
                  <div class="tooltip-btn">
                    <button type="button" class="btn btn-danger btn-sm delete-btn">
                      <i class="fas fa-trash"></i>
                    </button>
                    <span class="tooltip-text">Delete</span>
                  </div>
                </div>
              </td>
            </tr>
          `;
            tableBody.insertAdjacentHTML("beforeend", row);
          }
          document.getElementById("hotelMarkupForm").reset(); // Reset form fields after adding
        });

      // Edit Hotel Markup Row
      document
        .getElementById("hotelMarkupTableBody")
        .addEventListener("click", function (event) {
          if (event.target.classList.contains("edit-btn") || event.target.closest(".edit-btn")) {
            const button = event.target.classList.contains("edit-btn") ? event.target : event.target.closest(".edit-btn");
            currentRow = button.closest("tr");
            document.getElementById("editPriceFrom").value =
              currentRow.cells[0].textContent;
            document.getElementById("editPriceTo").value =
              currentRow.cells[1].textContent;
            document.getElementById("editMarkupPercentage").value =
              currentRow.cells[2].textContent;
            $("#editMarkupModal").modal("show");
          }
        });

      // Save Edited Markup
      document
        .getElementById("saveEditedMarkup")
        .addEventListener("click", function () {
          if (currentRow) {
            currentRow.cells[0].textContent =
              document.getElementById("editPriceFrom").value;
            currentRow.cells[1].textContent =
              document.getElementById("editPriceTo").value;
            currentRow.cells[2].textContent = document.getElementById(
              "editMarkupPercentage"
            ).value;
          }
        });

      // Delete Hotel Markup Row
      document
        .getElementById("hotelMarkupTableBody")
        .addEventListener("click", function (event) {
          if (event.target.classList.contains("delete-btn") || event.target.closest(".delete-btn")) {
            if (confirm("Are you sure you want to delete this row?")) {
              const button = event.target.classList.contains("delete-btn") ? event.target : event.target.closest(".delete-btn");
              button.closest("tr").remove();
            }
          }
        });
    </script>
  </body>
</html>
