<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tax Invoices</title>
    <link href="../vendors/bootstrap/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="../vendors/font-awesome/css/font-awesome.min.css" rel="stylesheet" />
    <link href="../build/css/custom.min.css" rel="stylesheet" />
    <style>
      :root { --brand: #1abb9c; --ink: #243b53; --soft: #f5f8fb; }
      body { background: var(--soft); color: var(--ink); }
      .tax-shell { max-width: 1500px; margin: 0 auto; padding: 32px 18px 70px; }
      .tax-header { display: flex; align-items: center; justify-content: space-between; gap: 18px; margin-bottom: 24px; }
      .tax-header h1 { margin: 0; font-size: 28px; font-weight: 700; color: var(--ink); }
      .tax-header p { margin: 4px 0 0; color: #627d98; }
      .filter-bar { background: #fff; border: 1px solid #dce5ee; border-radius: 8px; padding: 16px; margin-bottom: 18px; }
      .table-card { background: #fff; border: 1px solid #dce5ee; border-radius: 8px; overflow: hidden; }
      .table-card table { margin: 0; }
      .table-card th { background: var(--ink); color: #fff; border: 0 !important; font-size: 12px; text-transform: uppercase; }
      .table-card td { vertical-align: middle !important; }
      .badge-confirmed { background: #d8f3dc; color: #267442; font-weight: 700; padding: 5px 9px; border-radius: 99px; }
      .document-actions { display: flex; flex-wrap: wrap; gap: 6px; min-width: 320px; }
      .document-actions .btn { white-space: nowrap; }
      .doc-state { display: inline-block; margin-top: 6px; color: #527a66; font-size: 11px; }
      .empty-state { text-align: center; padding: 58px 20px; color: #627d98; }
      .empty-state .fa { font-size: 44px; color: #cbd5e1; display: block; margin-bottom: 12px; }
      @media (max-width: 950px) { .document-actions { min-width: 0; } .tax-header { align-items: flex-start; flex-direction: column; } }
    </style>
  </head>
  <body>
    <main class="tax-shell">
      <div class="tax-header">
        <div>
          <h1><i class="fa fa-file-text-o" style="color:#1abb9c"></i> Tax Invoices</h1>
          <p>Create tax documents only from confirmed bookings.</p>
        </div>
        <div>
          <a href="invoice_management.html" class="btn btn-default"><i class="fa fa-file-o"></i> Proforma Invoices</a>
          <button id="refreshButton" class="btn btn-primary"><i class="fa fa-refresh"></i> Refresh</button>
        </div>
      </div>

      <section class="filter-bar">
        <div class="row">
          <div class="col-md-7"><input id="searchBox" class="form-control" placeholder="Search by file number, client, agent, or invoice number" /></div>
          <div class="col-md-5 text-right" style="padding-top:7px"><span id="bookingCount" class="text-muted"></span></div>
        </div>
      </section>

      <section class="table-card table-responsive">
        <table class="table table-hover">
          <thead><tr>
            <th>File Number</th><th>Booking Date</th><th>Client</th><th>Agent</th><th>Telephone</th><th>Pax</th><th>Amount (Excl. Tax)</th><th>Status</th><th>Tax Documents</th>
          </tr></thead>
          <tbody id="taxInvoiceTableBody"></tbody>
        </table>
      </section>
    </main>
    <script src="js/config.js"></script>
    <script src="js/tax_invoices/tax_invoices.js?v=20260717"></script>
  </body>
</html>
