    <style>
      /* Modern form enhancements */
      .form-control:focus {
        border-color: #1abb9c !important;
        box-shadow: 0 0 0 0.2rem rgba(26, 187, 156, 0.25) !important;
      }

      .btn-primary {
        background: linear-gradient(135deg, #1abb9c 0%, #16a085 100%);
        border: none;
        transition: all 0.3s ease;
      }

      .btn-primary:hover {
        background: linear-gradient(135deg, #16a085 0%, #138d75 100%);
        transform: translateY(-1px);
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      }

      .btn-secondary {
        background: linear-gradient(135deg, #95a5a6 0%, #7f8c8d 100%);
        border: none;
        transition: all 0.3s ease;
      }

      .btn-secondary:hover {
        background: linear-gradient(135deg, #7f8c8d 0%, #6c7b7d 100%);
        transform: translateY(-1px);
      }

      .btn-success {
        background: linear-gradient(135deg, #27ae60 0%, #229954 100%);
        border: none;
        transition: all 0.3s ease;
      }

      .btn-success:hover {
        background: linear-gradient(135deg, #229954 0%, #1e8449 100%);
        transform: translateY(-1px);
      }

      .btn-warning {
        background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
        border: none;
        transition: all 0.3s ease;
      }

      .btn-warning:hover {
        background: linear-gradient(135deg, #e67e22 0%, #d35400 100%);
        transform: translateY(-1px);
      }

      .btn-danger {
        background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
        border: none;
        transition: all 0.3s ease;
      }

      .btn-danger:hover {
        background: linear-gradient(135deg, #c0392b 0%, #a93226 100%);
        transform: translateY(-1px);
      }

      .form-control {
        height: 45px;
        border-radius: 6px;
        border: 1px solid #ddd;
        background-color: #fafbfc;
        transition: all 0.3s ease;
      }

      .form-control:hover {
        border-color: #1abb9c;
      }

      textarea.form-control {
        height: auto;
        min-height: 100px;
      }

      .form-group label {
        font-weight: 600;
        color: #34495e;
        margin-bottom: 8px;
      }

      .input-group-append .btn {
        height: 45px;
        border-radius: 0 6px 6px 0;
      }

      .modal-content {
        border-radius: 10px;
        border: none;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      }

      .modal-header {
        background: linear-gradient(135deg, #34495e 0%, #2c3e50 100%);
        color: white;
        border-radius: 10px 10px 0 0;
        border-bottom: none;
      }

      .modal-title {
        font-weight: 600;
      }

      .close {
        color: white;
        opacity: 0.8;
        text-shadow: none;
      }

      .close:hover {
        color: white;
        opacity: 1;
      }

      /* Loading animation */
      .fa-spin {
        animation: fa-spin 1s infinite linear;
      }

      @keyframes fa-spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      /* Responsive improvements */
      @media (max-width: 768px) {
        .main-content {
          padding: 20px !important;
        }

        .form-control {
          height: 42px !important;
        }

        .btn {
          padding: 10px 20px !important;
          font-size: 13px !important;
        }
      }
    </style>
  </head>

                      </div>

                    <div class="col-md-4 col-sm-6 col-xs-12" style="margin-bottom: 15px;">

                        <input type="checkbox" class="custom-control-input perm-checkbox" id="perm_special_packages" checked>

                          <i class="fas fa-running" style="width: 20px; color: #1abb9c; margin-right: 5px;"></i> Activities
                        </label>

                    </div>

                        <label class="custom-control-label" for="perm_suppliers" style="font-weight: 500; cursor: pointer; color: #333;">

                    border-radius: 8px;
                    padding: 25px;
                    text-align: center;
                  "
                >
                  <h5
                    style="
                      color: #34495e;
                      margin-bottom: 15px;
                      font-weight: 600;
                    "
                  >
                    <i

                      style="margin-right: 10px; color: #f39c12"
                    ></i>
                    Password Management

                  <p

                  </button>
                </div>

            </form>

            <!-- Action Buttons -->
            <div
              style="
                display: flex;
                gap: 15px;
                justify-content: center;
                padding-top: 30px;
                border-top: 2px solid #ecf0f1;
              "
            >
              <button
                type="button"
                class="btn btn-secondary"
                onclick="window.location.href='users.html'"

    <!-- Change Password Modal -->
    <div
      class="modal fade"
      id="changePasswordModal"
      tabindex="-1"
      role="dialog"
      aria-labelledby="changePasswordModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog" role="document">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="changePasswordModalLabel">
              <i class="fas fa-key" style="margin-right: 8px"></i>
              Change Password
            </h5>
            <button
              type="button"
              class="close"
              data-dismiss="modal"
              aria-label="Close"
            >
              <span aria-hidden="true">&times;</span>
            </button>
          </div>
          <div class="modal-body">
            <form id="changePasswordForm" autocomplete="off">
              <div class="form-group">
                <label for="currentPassword">
                  <i
                    class="fas fa-lock"
                    style="margin-right: 8px; color: #1abb9c"
                  ></i>
                  Current Password *
                </label>
                <div class="input-group">
                  <input
                    type="password"
                    class="form-control"
                    id="currentPassword"
                    placeholder="Enter current password"
                    required
                    value=""
                    autocomplete="current-password"
                  />
                  <div class="input-group-append">
                    <span
                      class="input-group-text"
                      id="toggleCurrentPassword"
                      style="cursor: pointer; user-select: none"
                      title="Toggle password visibility"
                    >
                      <i class="fas fa-eye" id="currentPasswordEyeIcon"></i>
                    </span>
                  </div>
                </div>
              </div>
              <div class="form-group">
                <label for="newPassword">
                  <i
                    class="fas fa-key"
                    style="margin-right: 8px; color: #1abb9c"
                  ></i>
                  New Password *
                </label>
                <div class="input-group">
                  <input
                    type="password"
                    class="form-control"
                    id="newPassword"
                    placeholder="Enter new password (min 6 characters)"
                    minlength="6"
                    required
                    value=""
                    autocomplete="new-password"
                  />
                  <div class="input-group-append">
                    <span
                      class="input-group-text"
                      id="toggleNewPassword"
                      style="cursor: pointer; user-select: none"
                      title="Toggle password visibility"
                    >
                      <i class="fas fa-eye" id="newPasswordEyeIcon"></i>
                    </span>
                  </div>
                </div>
              </div>
              <div class="form-group">
                <label for="confirmNewPassword">
                  <i
                    class="fas fa-check-circle"
                    style="margin-right: 8px; color: #1abb9c"
                  ></i>
                  Confirm New Password *
                </label>
                <div class="input-group">
                  <input
                    type="password"
                    class="form-control"
                    id="confirmNewPassword"
                    placeholder="Confirm new password"
                    minlength="6"
                    required
                    value=""
                    autocomplete="new-password"
                  />
                  <div class="input-group-append">
                    <span
                      class="input-group-text"
                      id="toggleConfirmNewPassword"
                      style="cursor: pointer; user-select: none"
                      title="Toggle password visibility"
                    >
                      <i class="fas fa-eye" id="confirmNewPasswordEyeIcon"></i>
                    </span>
                  </div>
                </div>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-dismiss="modal"
            >
              Cancel
            </button>
            <button
              type="button"
              id="savePasswordChange"
              class="btn btn-primary"
            >
              <i class="fas fa-save" style="margin-right: 8px"></i>
              Save Password
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <!-- Bootstrap -->
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script>
    <!-- Custom Scripts -->
    <script src="../build/js/custom.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/Users/edit_user.js"></script>

    <script>
      // Toggle password visibility functionality
      document.addEventListener("DOMContentLoaded", function () {
        // Clear password modal fields when modal is shown
        $("#changePasswordModal").on("show.bs.modal", function () {
          setTimeout(function () {
            document.getElementById("currentPassword").value = "";
            document.getElementById("newPassword").value = "";
            document.getElementById("confirmNewPassword").value = "";

            // Reset eye icons to default state
            const currentPasswordEyeIcon = document.getElementById(
              "currentPasswordEyeIcon"
            );
            const newPasswordEyeIcon =
              document.getElementById("newPasswordEyeIcon");
            const confirmNewPasswordEyeIcon = document.getElementById(
              "confirmNewPasswordEyeIcon"
            );

            if (currentPasswordEyeIcon) {
              currentPasswordEyeIcon.classList.remove("fa-eye-slash");
              currentPasswordEyeIcon.classList.add("fa-eye");
            }
            if (newPasswordEyeIcon) {
              newPasswordEyeIcon.classList.remove("fa-eye-slash");
              newPasswordEyeIcon.classList.add("fa-eye");
            }
            if (confirmNewPasswordEyeIcon) {
              confirmNewPasswordEyeIcon.classList.remove("fa-eye-slash");
              confirmNewPasswordEyeIcon.classList.add("fa-eye");
            }

            // Reset password field types
            document.getElementById("currentPassword").type = "password";
            document.getElementById("newPassword").type = "password";
            document.getElementById("confirmNewPassword").type = "password";
          }, 50);
        });

        // Also clear when modal is hidden
        $("#changePasswordModal").on("hidden.bs.modal", function () {
          document.getElementById("currentPassword").value = "";
          document.getElementById("newPassword").value = "";
          document.getElementById("confirmNewPassword").value = "";

          // Reset form validation classes
          const form = document.getElementById("changePasswordForm");
          if (form) {
            form.classList.remove("was-validated");
          }
        });
        // Toggle for current password field with eye icon
        const toggleCurrentPassword = document.getElementById(
          "toggleCurrentPassword"
        );
        const currentPasswordField = document.getElementById("currentPassword");
        const currentPasswordEyeIcon = document.getElementById(
          "currentPasswordEyeIcon"
        );

        if (
          toggleCurrentPassword &&
          currentPasswordField &&
          currentPasswordEyeIcon
        ) {
          toggleCurrentPassword.addEventListener("click", function () {
            if (currentPasswordField.type === "password") {
              currentPasswordField.type = "text";
              currentPasswordEyeIcon.classList.remove("fa-eye");
              currentPasswordEyeIcon.classList.add("fa-eye-slash");
            } else {
              currentPasswordField.type = "password";
              currentPasswordEyeIcon.classList.remove("fa-eye-slash");
              currentPasswordEyeIcon.classList.add("fa-eye");
            }
          });
        }

        // Toggle for new password field with eye icon
        const toggleNewPassword = document.getElementById("toggleNewPassword");
        const newPasswordField = document.getElementById("newPassword");
        const newPasswordEyeIcon =
          document.getElementById("newPasswordEyeIcon");

        if (toggleNewPassword && newPasswordField && newPasswordEyeIcon) {
          toggleNewPassword.addEventListener("click", function () {
            if (newPasswordField.type === "password") {
              newPasswordField.type = "text";
              newPasswordEyeIcon.classList.remove("fa-eye");
              newPasswordEyeIcon.classList.add("fa-eye-slash");
            } else {
              newPasswordField.type = "password";
              newPasswordEyeIcon.classList.remove("fa-eye-slash");
              newPasswordEyeIcon.classList.add("fa-eye");
            }
          });
        }

        // Toggle for confirm new password field with eye icon
        const toggleConfirmNewPassword = document.getElementById(
          "toggleConfirmNewPassword"
        );
        const confirmNewPasswordField =
          document.getElementById("confirmNewPassword");
        const confirmNewPasswordEyeIcon = document.getElementById(
          "confirmNewPasswordEyeIcon"
        );

        if (
          toggleConfirmNewPassword &&
          confirmNewPasswordField &&
          confirmNewPasswordEyeIcon
        ) {
          toggleConfirmNewPassword.addEventListener("click", function () {
            if (confirmNewPasswordField.type === "password") {
              confirmNewPasswordField.type = "text";
              confirmNewPasswordEyeIcon.classList.remove("fa-eye");
              confirmNewPasswordEyeIcon.classList.add("fa-eye-slash");
            } else {
              confirmNewPasswordField.type = "password";
              confirmNewPasswordEyeIcon.classList.remove("fa-eye-slash");
              confirmNewPasswordEyeIcon.classList.add("fa-eye");
            }
          });
        }

        // Form submission handler
        const submitButton = document.getElementById("submitEditUser");
        const editUserForm = document.getElementById("editUserForm");

        if (submitButton && editUserForm) {
          submitButton.addEventListener("click", function (event) {
            event.preventDefault();

            // Check if the form is valid
            if (!editUserForm.checkValidity()) {
              editUserForm.classList.add("was-validated");
              return;
            }

            // Trigger the form submission (handled by edit_user.js)
            const submitEvent = new Event("submit", {
              bubbles: true,
              cancelable: true,
            });
            editUserForm.dispatchEvent(submitEvent);
          });
        }

        // Password change handler
        const savePasswordButton =
          document.getElementById("savePasswordChange");
        const changePasswordForm =
          document.getElementById("changePasswordForm");

        if (savePasswordButton && changePasswordForm) {
          savePasswordButton.addEventListener("click", function (event) {
            event.preventDefault();

            // Check if the form is valid
            if (!changePasswordForm.checkValidity()) {
              changePasswordForm.classList.add("was-validated");
              return;
            }

            // Trigger the form submission (handled by edit_user.js)
            const submitEvent = new Event("submit", {
              bubbles: true,
              cancelable: true,
            });
            changePasswordForm.dispatchEvent(submitEvent);
          });
        }
      });
    </script>
  </body>
</html>
